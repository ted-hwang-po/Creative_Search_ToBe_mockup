<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creative Search — 소재 검색 결과 요약</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
    <meta name="description" content="광고 소재 검색 결과를 요약·인사이트·실행 제안까지 한 화면에서 확인하는 프로토타입">

    <!-- Force light color-scheme so native form controls don't flip to dark-mode styling -->
    <style>
      html {
        color-scheme: light;
      }
      /* Fallback for Tailwind line-clamp plugin (CDN build may not include it) */
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
      }
    </style>

    <!-- Tailwind (CDN for quick prototype) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React 18 UMD -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel Standalone: run JSX without a build step -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-zinc-50">
    <div id="root"></div>
    <script src="./boot.js"></script>
  </body>
</html>
